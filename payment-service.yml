server:
  port: 6004

spring:
  application:
    name: payment-service

  boot:
    admin:
      client:
        url: http://localhost:9090

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always
